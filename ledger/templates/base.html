<html lang="en">
    <head>
        <h1>Recipe Book</h1>
    </head>
    <body>
        <div>
            {% block content %}{% endblock %}
        </div>
        {% if user.is_authenticated %}
            <form method="POST" action="{% url 'ledger:logout' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <br>
            <a href="{% url 'ledger:login' %}">Login </a>
        {% endif %}
    </body>
</html>
